name: todoapp CI
run-name: User "${{github.actor}}" started job from "${{github.ref_name}}" branch with "${{github.sha}}" commit

on:
    push:
        branches:
            - main

    pull_request:
        branches:
            - main

env:
    PYTHON_VERSION: 3.8
    DOCKER_IMAGE_NAME: kube2py

jobs:
    python-ci:
        name: "Python CI: Test code and lint"

        runs-on: ubuntu-latest

        defaults:
            run:
                working-directory: ./src

        steps:
        - name: Copying repository
          uses: actions/checkout@v5

        - name: install python v${{env.PYTHON_VERSION}}
          uses: actions/setup-python@v6
          with:
            python-version: ${{env.PYTHON_VERSION}}
        - name: install dependencies
          run: |
            python -m pip install --upgrade pip
            pip install -r requirements.txt
            pip install pytest pytest-django flake8 coverage

        - name: Test app
          run: |
            coverage run manage.py test

        - name: Test Coverage
          run: |
            coverage report -m

        - name: Lint
          run: |
            flake8 --exit-zero --statistics --show-source

        - name: Complexity
          run: |
            flake8 --exit-zero --max-complexity=10 --statistics

        - name: Upload artifact
          if: github.ref_name == 'main'
          uses: actions/upload-artifact@v7
          with:
            name: artifact
            path: .


    build-image:
      name: "Python CI: Build Docker Image"

      if: github.ref_name == 'main'

      runs-on: ubuntu-latest


      needs:
      - python-ci

      steps:
      - name: Downlaod artifact
        uses: actions/download-artifact@v4
        with:
          name: artifact
          path: .

      - name: Login in Docker Hub
        uses: docker/login-action@v4
        with:
          username: ${{secrets.DOCKERHUB_USERNAME}}
          password: ${{secrets.DOCKERHUB_TOKEN}}
      - name: Build and push
        uses: docker/build-push-action@v7
        with:
          context: .
          push: true
          tags: ${{secrets.DOCKERHUB_USERNAME}}/${{env.DOCKER_IMAGE_NAME}}:${{github.sha}}
