name: todoapp CI
run-name: User ${{github.actor}} started job from ${{github.ref_name}} branch with ${{github.event.head_commit.message}} commit

on:
    push:
        branches:
            - main
            - develop

    pull_request:
        branches:
            - main
            - develop

env:
    PYTHON_VERSION: 3.8

jobs:
    python-ci:
        runs-on: ubuntu-latest

        defaults:
            run:
                working-directory: ./src

        steps:

            - name: Copying repository
              uses: actions/checkout@v5

            - name: install python v${{env.PYTHON_VERSION}}
              uses: actions/setup-python@v6
              with:
                python-version: ${{env.PYTHON_VERSION}}
            - name: install dependencies
              run: |
                python -m pip install --upgrade pip
                pip install -r requirements.txt
                pip install pytest pytest-django flake8 coverage

            - name: Test app
              run: |
                coverage run manage.py test

            - name: Test Coverage
              run: |
                coverage report -m

            - name: Lint
              run: |
                flake8 --exit-zero --statistics --show-source

            - name: Complexity
              run: |
                flake8 --exit-zero --statistics --max-complexity 10

            - name: Upload atrifact
              uses: actions/upload-artifact@v7
              with:
                name: artifact
                path: .